{% extends 'base.html' %}

{% load static %}

    {% block content %}

<div class="col-span-6">


    <main class="px-16 py-6 bg-slate-900 shadow-xl">
        <div class="flex justify-end">
            <a href="">Login</a>
            <a class="ml-3" href="">Sign Up</a>
        </div>
        <header class="flex justify-items">

            <h2 class="text-white text-6xl font-semibold"></h2>



        </header>

        <div class="shadow-lg text-black px-1 bg-white border border-sky-400 rounded-lg px-16 py-6 mt-8">


<form method="post" action="" class="max-w-sm mx-auto" hx-post="{% url 'fw-checklist' %}" hx-target="#table-insert"
                  hx-swap="afterend" hx-on::after-request="this.reset()">
    {% csrf_token %}

    <input class="btn btn-blue text-white bg-sky-400 hover:bg-sky-800 focus:ring-4 focus:outline-none focus:ring-sky-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800" type="submit" value="submit">

</form>


            </div>
      <div class="relative overflow-x-auto">
    <table class="w-full text-lg font-bold text-left rtl:text-right text-yellow-400 dark:text-gray-400">

        <tbody>
    {% for key, val in dict.items %}
              <tr >
    <td>{{ key }}</td>
    {% if val == "green" %}
    <td><img src="{% static 'images/green_circle.png' %}" alt=""></td>
     {% else %}
     <td><img src="{% static 'images/red_circle.jpg' %}" alt=""></td>
      {% endif %}
                </tr>
     {% endfor %}
</tbody>
    </table>
</div>
        </main>
        </div>

{% endblock %}
