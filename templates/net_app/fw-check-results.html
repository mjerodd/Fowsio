{% extends 'base.html' %}

{% load static %}

    {% block content %}


<div class="col-span-6">


    <main class="px-16 py-6 bg-gray-200 border-4 border-white shadow-xl">
        <div class="flex justify-end">
            <a href="">Login</a>
            <a class="ml-3" href="">Sign Up</a>
        </div>
        <header class="flex justify-items">

            <h2 class="text-white text-6xl font-semibold"></h2>



        </header>

        <div class="shadow-lg text-black px-1 bg-white border border-sky-400 rounded-lg px-16 py-6 mt-8">


<form class="max-w-sm mx-auto" method="post" enctype="multipart/form-data">
    {% csrf_token %}
  <div class="mb-5">
    <label class="block mb-2 text-md font-medium text-gray-900 dark:text-white">{{form.ip_address.label}}</label>
      {{form.ip_address}}
  </div>
    <br>

    <br>

</form>
            <br>
        <div class="relative overflow-x-auto">
            <h3>Results for {{ hostname }}</h3>
            <br>
    <table class="border-separate border border-black shadow-xl w-full text-lg font-bold text-left rtl:text-right text-black dark:text-gray-400">


            <tbody>
    {% for key, val in dict.items %}
              <tr class="bg-white">
    <td class="border-4 border-black px-6 py-4">{{ key }}</td>
    {% if val == "green" %}
    <td class="border-4 border-black px-6 py-4 bg-white"><img src="{% static 'images/green_dot.PNG' %}" class="w-1/6" alt=""></td>
     {% else %}
     <td class="border-4 border-black px-6 py-4 bg-white"><img src="{% static 'images/red_dot.PNG' %}" class="w-1/6" alt=""></td>
      {% endif %}
                </tr>
     {% endfor %}
            </tbody>

        </table>

    </div>
        </div>
        </main>
        </div>
</html>
{% endblock %}
