{% extends 'base.html' %}

{% load static %}

    {% block content %}


<div class="col-span-6">


    <main class="px-16 py-6 bg-gray-200 border-4 border-white shadow-xl">
        <div class="flex justify-end">
            <a href="">Login</a>
            <a class="ml-3" href="">Sign Up</a>
        </div>
        <header class="flex justify-items">

            <h2 class="text-white text-6xl font-semibold"></h2>



        </header>

        <div class="shadow-lg text-black px-1 bg-white border-4 border-sky-400 rounded-lg px-16 py-6 mt-8">
<h2>Deploy Palo Alto High Availability</h2>

<form class="max-w-sm mx-auto" method="post" enctype="multipart/form-data">
    {% csrf_token %}
  <div class="mb-5 shadow-md bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 dark:shadow-xs-light">
    <label class="block mb-2 text-md font-bold text-gray-900 dark:text-white">{{form.fw_hostname.label}}</label>
      {{form.fw_hostname}}
  </div>
    <br>
<div class="mb-5 shadow-md bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 dark:shadow-xs-light">
    <label class="block mb-2 text-md font-bold text-gray-900 dark:text-white">{{form.fw_ip.label}}</label>
      {{form.fw_ip}}
  </div>
  <br>
<div class="mb-5 shadow-md bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 dark:shadow-xs-light">
    <label class="block mb-2 text-md font-bold text-gray-900 dark:text-white">{{form.fw_model.label}}</label>
      {{form.fw_model}}
  </div>
    <br>
  <button type="submit" class="text-white bg-blue-800 hover:bg-sky-800 focus:ring-4 focus:outline-none focus:ring-sky-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">deploy</button>
</form>
        <div class='progress-wrapper'>
  <div id='progress-bar' class='progress-bar' style="background-color: #68a9ef; width: 0%;">&nbsp;</div>
</div>
            <br>
            <br>

        </div>
        </main>
        </div>
</html>
{% endblock %}
